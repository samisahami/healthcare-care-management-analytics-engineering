version: 2

models:
  - name: mart_member_outreach_priority
    description: Final member-level mart for care management outreach prioritization.
    columns:
      - name: member_id
        description: Unique member identifier.
        tests:
          - not_null
          - unique

      - name: engagement_status
        description: Member engagement status derived from care management interactions.
        tests:
          - accepted_values:
              values: ['Engaged', 'Not Engaged']

      - name: outreach_priority
        description: Derived outreach priority based on risk level, engagement status, and utilization.
        tests:
          - accepted_values:
              values: ['High Priority', 'Medium Priority', 'Low Priority']